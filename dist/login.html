<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HACKATEER | Gatekeeper Authentication</title>
  
  <!-- Google Fonts: Space Grotesk and Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --border-color: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #94a3b8;
      --accent-blue: #2563eb;
      --accent-purple: #7c3aed;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'Space Grotesk', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Fine Tech Dotted Mesh Grid Overlay */
    .dotted-grid-bg {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
      background-size: 24px 24px;
      z-index: 1;
    }

    /* Ambient Radial Blurred Orbs */
    .glowing-orb {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, rgba(124, 58, 237, 0.05) 50%, transparent 100%);
      filter: blur(80px);
      top: -10%;
      right: -10%;
      z-index: 2;
      animation: pulse 10s infinite alternate;
    }

    .glowing-orb-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, rgba(37, 99, 235, 0.04) 50%, transparent 100%);
      filter: blur(80px);
      bottom: -10%;
      left: -10%;
      z-index: 2;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    /* Custom Cursor */
    .custom-cursor {
      width: 8px;
      height: 8px;
      background: var(--accent-blue);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background-color 0.2s;
    }

    .custom-cursor-follower {
      width: 32px;
      height: 32px;
      border: 1.5px solid rgba(37, 99, 235, 0.3);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease-out, width 0.2s, height 0.2s, border-color 0.2s;
    }

    .custom-cursor.hovered {
      width: 14px;
      height: 14px;
      background-color: var(--accent-purple);
    }

    .custom-cursor-follower.hovered {
      width: 48px;
      height: 48px;
      border-color: rgba(124, 58, 237, 0.4);
    }

    /* Central Auth Card Container */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      perspective: 1000px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.04);
      text-align: center;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
    }

    .login-card:hover {
      border-color: rgba(37, 99, 235, 0.2);
    }

    /* Logo stack */
    .nav-brand {
      font-family: var(--font-mono);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      margin-bottom: 24px;
    }

    .login-title {
      font-family: var(--font-mono);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 36px;
    }

    /* Buttons block */
    .actions-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn-auth {
      width: 100%;
      height: 52px;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      outline: none;
    }

    .btn-google {
      background-color: var(--text-primary);
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
    }

    .btn-google:hover {
      background-color: #1e293b;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.2);
    }

    .btn-google:active {
      transform: translateY(0);
    }

    .btn-google i {
      font-size: 1.1rem;
    }

    .btn-mock {
      background-color: white;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.01);
    }

    .btn-mock:hover {
      color: var(--accent-blue);
      border-color: var(--accent-blue-light);
      background-color: rgba(37, 99, 235, 0.02);
      transform: translateY(-2px);
    }

    .btn-mock:active {
      transform: translateY(0);
    }

    /* Alert Banner */
    .config-status-alert {
      margin-top: 24px;
      padding: 10px 14px;
      background-color: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 10px;
      font-size: 0.76rem;
      color: #b45309;
      line-height: 1.4;
      text-align: left;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .config-status-alert i {
      margin-top: 2px;
    }

    /* Footer styling */
    .login-footer {
      margin-top: 36px;
      font-size: 0.72rem;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .login-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      color: var(--accent-blue);
    }
  </style>
</head>
<body>
  
  <!-- Mesh Canvas -->
  <div class="dotted-grid-bg"></div>
  <div class="glowing-orb"></div>
  <div class="glowing-orb-2"></div>

  <!-- Custom Cursor Followers -->
  <div class="custom-cursor"></div>
  <div class="custom-cursor-follower"></div>

  <!-- Card Wrapper -->
  <div class="login-container">
    <div class="login-card">
      <a class="nav-brand" href="index.html">Hackateer</a>
      
      <h1 class="login-title">Workspace Gate</h1>
      <p class="login-subtitle">Authenticate via your Chrome Google profile to verify developer credentials and audit active project builds.</p>
      
      <div class="actions-stack">
        <button class="btn-auth btn-google" id="btn-login-google">
          <i class="fa-brands fa-google"></i>
          <span>Sign in with Google</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Core Firebase Scripts & Auth Client -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      // Redirect if already authenticated
      HackateerAuth.checkAuthState(
        (user) => {
          // Logged in! Go to dashboard
          window.location.href = 'dashboard.html';
        },
        () => {
          // Unauthenticated, stay on this page
          console.log("Hackateer Auth: Awaiting developer sign-in...");
        }
      );

      const googleBtn = document.getElementById('btn-login-google');

      // 1. Google Auth handler
      googleBtn.addEventListener('click', async () => {
        if (!HackateerAuth.isFirebaseActive()) {
          alert("Firebase keys are not configured. Please enter your credentials in 'firebase-config.js'.");
          return;
        }

        try {
          googleBtn.disabled = true;
          googleBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Connecting...';
          const user = await HackateerAuth.signInWithGoogle();
          console.log("Logged in:", user);
          window.location.href = 'dashboard.html';
        } catch (err) {
          alert("Login error: " + err.message);
          googleBtn.disabled = false;
          googleBtn.innerHTML = '<i class="fa-brands fa-google"></i> Sign in with Google';
        }
      });

      /* Custom Cursor Track */
      const cursor = document.querySelector('.custom-cursor');
      const follower = document.querySelector('.custom-cursor-follower');
      
      let mouseX = 0, mouseY = 0;
      let followerX = 0, followerY = 0;
      
      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        
        if (cursor) {
          cursor.style.left = `${mouseX}px`;
          cursor.style.top = `${mouseY}px`;
        }
      });
      
      function updateFollower() {
        followerX += (mouseX - followerX) * 0.15;
        followerY += (mouseY - followerY) * 0.15;
        
        if (follower) {
          follower.style.left = `${followerX}px`;
          follower.style.top = `${followerY}px`;
        }
        requestAnimationFrame(updateFollower);
      }
      updateFollower();

      function attachCursorHover(elements) {
        elements.forEach(el => {
          el.addEventListener('mouseenter', () => {
            cursor?.classList.add('hovered');
            follower?.classList.add('hovered');
          });
          el.addEventListener('mouseleave', () => {
            cursor?.classList.remove('hovered');
            follower?.classList.remove('hovered');
          });
        });
      }
      attachCursorHover(document.querySelectorAll('a, button, input, .btn-auth'));

    });
  </script>
</body>
</html>
